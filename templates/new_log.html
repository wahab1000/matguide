{% extends "base.html" %}
{% block content %}
<section class="form-page">
  <div class="form-card wide">
    <h1>Add Training Log</h1>
    <p class="muted-text">Record what you trained, how long you trained, and what you learned.</p>

    <form method="POST" class="styled-form">
      <label for="session_date">Date</label>
      <input type="date" name="session_date" id="session_date" required>

      <label for="duration_minutes">Duration (minutes)</label>
      <input type="number" name="duration_minutes" id="duration_minutes" min="0">

      <label for="techniques">Techniques Practised</label>
      <input type="text" name="techniques" id="techniques" placeholder="e.g. Shrimp, Knee Slide Guard Pass">

      <label for="notes">Notes</label>
      <textarea name="notes" id="notes" rows="6" placeholder="What worked well? What needs improving?"></textarea>

      <button type="submit" class="button">Save Log</button>
    </form>
  </div>
</section>
{% endblock %}
