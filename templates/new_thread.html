{% extends "base.html" %}
{% block content %}
<section class="form-page">
  <div class="form-card wide">
    <h1>Create Discussion Thread</h1>
    <p class="muted-text">Start a public discussion and optionally link it to a technique.</p>

    <form method="POST" class="styled-form">
      <label for="title">Thread Title</label>
      <input type="text" name="title" id="title" required>

      <label for="category">Category</label>
      <select name="category" id="category" required>
        <option value="">Select category</option>
        {% for category in categories %}
          <option value="{{ category }}">{{ category }}</option>
        {% endfor %}
      </select>

      <label for="technique_id">Related Technique (optional)</label>
      <select name="technique_id" id="technique_id">
        <option value="">No related technique</option>
        {% for technique in techniques %}
          <option value="{{ technique.id }}">{{ technique.name }}</option>
        {% endfor %}
      </select>

      <label for="body">Post Content</label>
      <textarea name="body" id="body" rows="8" required></textarea>

      <button type="submit" class="button">Create Thread</button>
    </form>
  </div>
</section>
{% endblock %}
